<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Yvan Phone Store{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: Arial; background: #f5f6fa; }
        .navbar { background: #2563eb; }
        .navbar a { color: white !important; margin-right: 15px; }
        .card { margin-bottom: 20px; }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg px-3">
    <a class="navbar-brand text-white" href="{% url 'store:index' %}">
        📱 Yvan Store
    </a>

    <div class="ms-auto">
        <a href="{% url 'store:index' %}">Home</a>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
