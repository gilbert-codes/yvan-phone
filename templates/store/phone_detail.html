{% extends 'store/base.html' %}

{% block content %}

<h2>{{ phone.name }}</h2>

{% if phone.image %}
  <img src="{{ phone.image.url }}" style="width:100%; border-radius:10px;">
{% endif %}

<p>{{ phone.description }}</p>

<p><b>Price:</b> {{ phone.price }}</p>

<!-- VOICE -->
<div>
  {% if phone.voice_note %}
    <audio controls>
      <source src="{{ phone.voice_note.url }}">
    </audio>
  {% else %}
    <a href="{% url 'store:generate_voice' phone.pk %}" class="btn">🔊 Generate Voice</a>
  {% endif %}
</div>

<!-- ACTIONS -->
<br>

<a href="{% url 'store:add_to_cart' phone.pk %}" class="btn">🛒 Add to Cart</a>

<a href="tel:+250788000000" class="btn">📞 Call</a>

<a href="https://wa.me/250788000000?text=I%20want%20{{ phone.name }}" class="btn">💬 WhatsApp</a>

<a href="{{ google_maps_url }}" target="_blank" class="btn">📍 Directions</a>

<hr>

<!-- MAP -->
<iframe
  width="100%"
  height="300"
  src="https://www.google.com/maps?q=Nyarugenge+Makuza+Parking+Kigali&output=embed">
</iframe>

<!-- AUTO VOICE (OPTIONAL) -->
<script>
window.onload = function () {
    let text = "{{ phone.name }} {{ phone.description|escapejs }}";
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speechSynthesis.speak(speech);
};
</script>

{% endblock %}
