{% extends 'store/base.html' %}

{% block content %}

<h2>{{ phone.name }}</h2>

{% if phone.image %}
<img src="{{ phone.image.url }}" width="300">
{% endif %}

<p>{{ phone.description }}</p>

<h4>{{ phone.price }} RWF</h4>

<hr>

<!-- VOICE -->
{% if phone.voice_note %}
<audio controls>
    <source src="{{ phone.voice_note.url }}">
</audio>
{% else %}
<a href="{% url 'store:generate_voice' phone.pk %}" class="btn btn-warning">
    Generate Voice
</a>
{% endif %}

<hr>

<!-- ACTIONS -->
<a href="{% url 'store:add_to_cart' phone.pk %}" class="btn btn-success">
    Add to Cart
</a>

<a href="https://wa.me/250791364244?text=I want {{ phone.name }}" class="btn btn-info">
    WhatsApp
</a>

<!-- GOOGLE MAP -->
<h5 class="mt-3">Location</h5>

<iframe
    width="100%"
    height="300"
    src="https://www.google.com/maps?q=Nyarugenge+Kigali+Makuza+Parking&output=embed">
</iframe>

{% endblock %}
