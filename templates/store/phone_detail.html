{% extends 'store/base.html' %}

{% block content %}

<div class="container py-4">

    <h2>{{ phone.name }}</h2>

    {% if phone.image %}
        <img src="{{ phone.image.url }}" style="width:100%; border-radius:10px;">
    {% endif %}

    <p>{{ phone.description }}</p>

    <h4>Price: {{ phone.price }}</h4>

    {% if phone.voice_note %}
        <audio controls style="width:100%;">
            <source src="{{ phone.voice_note.url }}" type="audio/mpeg">
        </audio>
    {% else %}
        <a href="{% url 'store:generate_voice' phone.pk %}" class="btn btn-primary">
            🔊 Generate Voice
        </a>
    {% endif %}

    <br><br>

    <a href="{% url 'store:add_to_cart' phone.pk %}" class="btn btn-success">
        🛒 Add to Cart
    </a>

    <a href="tel:+250791364244" class="btn btn-primary">
        📞 Call
    </a>

    <a href="https://wa.me/250791364244?text=I%20want%20{{ phone.name }}"
       class="btn btn-success">
        💬 WhatsApp
    </a>

    <hr>

    <h4>Our Location</h4>

    <iframe
        width="100%"
        height="350"
        style="border:0;border-radius:10px;"
        src="https://www.google.com/maps?q=Makuza+Peace+Plaza+Kigali&output=embed">
    </iframe>

</div>

{% endblock %}
