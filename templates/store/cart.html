{% extends 'store/base.html' %}

{% block content %}

<h2>Shopping Cart</h2>

{% if items %}

    {% for item in items %}
        <div class="card p-3">
            <h4>{{ item.phone.name }}</h4>
            <p>Qty: {{ item.quantity }}</p>
            <p>Price: {{ item.phone.price }} RWF</p>
        </div>
    {% endfor %}

    <h3>Total: {{ total }} RWF</h3>

{% else %}

    <p>Your cart is empty.</p>

{% endif %}

{% endblock %}
